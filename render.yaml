# Optional Render Blueprint. Add secrets in the dashboard (not in this file):
#   SUPABASE_URL, SUPABASE_KEY (anon/publishable only), SUPABASE_JWT_SECRET,
#   CORS_ORIGINS=https://your-app.vercel.app
#
# After deploy, set the same VITE_API_BASE_URL on Vercel to this service’s URL.

services:
  - type: web
    name: noexcuses-api
    runtime: python
    rootDir: backend
    buildCommand: pip install .
    startCommand: uvicorn noexcuses_backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.11"
